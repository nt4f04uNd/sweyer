name: Build Sweyer executables
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'releases/**'

jobs:
  build_executables:
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.2
          channel: stable
          cache: true

      - name: 💾 Cache Flutter build
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            build/
          key: flutter-build-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            flutter-build-${{ runner.os }}-

      - name: 💾 Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/transforms-3
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 📦 Install Dependencies
        shell: bash
        run: flutter pub get

      - name: 🔨 Build Apk
        shell: bash
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          flutter build apk --profile

      - name: 📁 Save executables
        uses: actions/upload-artifact@v7
        with:
          name: Android Apk
          path: build/app/outputs/flutter-apk/app-profile.apk
          compression-level: 0  # Executables are already compressed
